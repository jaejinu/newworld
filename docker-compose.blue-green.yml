version: '3.8'

# 블루그린 배포용 docker-compose
# 사용법: SLOT=blue|green docker compose -f docker-compose.blue-green.yml up -d

services:
  nginx:
    image: nginx:alpine
    container_name: theoneblog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.blue-green.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/active-slot.conf:/etc/nginx/conf.d/active-slot.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web-blue
      - api-blue
      - web-green
      - api-green
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    networks:
      - app-net

  certbot:
    image: certbot/certbot
    container_name: theoneblog-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ── Blue 슬롯 ──
  api-blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: theoneblog-api-blue
    restart: unless-stopped
    expose:
      - "4000"
    env_file:
      - ./backend/.env
    volumes:
      - api-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/categories"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-net

  web-blue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://api-blue:4000
    container_name: theoneblog-web-blue
    restart: unless-stopped
    expose:
      - "8088"
    depends_on:
      api-blue:
        condition: service_healthy
    networks:
      - app-net

  # ── Green 슬롯 ──
  api-green:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: theoneblog-api-green
    restart: unless-stopped
    expose:
      - "4000"
    env_file:
      - ./backend/.env
    volumes:
      - api-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/categories"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-net

  web-green:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://api-green:4000
    container_name: theoneblog-web-green
    restart: unless-stopped
    expose:
      - "8088"
    depends_on:
      api-green:
        condition: service_healthy
    networks:
      - app-net

volumes:
  api-uploads:

networks:
  app-net:
    driver: bridge
